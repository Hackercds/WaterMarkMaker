<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自定义水印工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  overflow: hidden;
}
.header {
  background: #16213e;
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #0f3460;
}
.header h1 { font-size: 18px; color: #e94560; }
.header .actions { display: flex; gap: 8px; }
.container {
  display: flex;
  height: calc(100vh - 53px);
}
/* Preview area */
.preview {
  flex: 1;
  display: flex; flex-direction: column;
  background: #16213e;
  position: relative;
  overflow: hidden;
}
.preview-canvas-area {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  overflow: auto;
}
.preview .drop-zone {
  border: 2px dashed #0f3460;
  border-radius: 12px;
  padding: 60px 40px;
  text-align: center;
  color: #6c7a8d;
  transition: all 0.3s;
  cursor: pointer;
}
.preview .drop-zone:hover,
.preview .drop-zone.drag-over { border-color: #e94560; color: #e94560; }
.preview .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
.preview .drop-zone p { font-size: 13px; line-height: 1.8; }
.preview canvas {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  cursor: crosshair;
  border-radius: 4px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.preview .canvas-wrapper { position: relative; display: inline-block; }
.preview input[type="file"] { display: none; }

/* Thumbnail strip */
.thumbnail-strip {
  display: flex; gap: 6px;
  padding: 8px 12px;
  background: #12122a;
  border-top: 1px solid #0f3460;
  overflow-x: auto;
  min-height: 74px;
  align-items: center;
}
.thumbnail-strip::-webkit-scrollbar { height: 4px; }
.thumbnail-strip::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }
.thumb {
  position: relative;
  width: 56px; height: 56px;
  border-radius: 6px; overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  flex-shrink: 0;
  transition: border-color 0.2s;
}
.thumb:hover { border-color: #4a6a9a; }
.thumb.active { border-color: #e94560; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb .thumb-index {
  position: absolute; top: 2px; left: 4px;
  font-size: 10px; color: #fff;
  background: rgba(0,0,0,0.6); border-radius: 3px;
  padding: 0 4px; line-height: 16px;
}
.thumb .thumb-remove {
  position: absolute; top: 2px; right: 2px;
  width: 16px; height: 16px;
  border-radius: 50%; background: rgba(233,69,96,0.9);
  color: #fff; border: none; cursor: pointer;
  font-size: 11px; line-height: 16px; text-align: center;
  display: none;
}
.thumb:hover .thumb-remove { display: block; }
.thumb .thumb-check {
  position: absolute; bottom: 2px; right: 2px;
  width: 18px; height: 18px;
  accent-color: #e94560;
  cursor: pointer;
  display: none;
}
.thumb:hover .thumb-check,
.thumb.show-check .thumb-check { display: block; }
.thumbnail-strip .add-btn {
  width: 56px; height: 56px;
  border-radius: 6px;
  border: 2px dashed #0f3460;
  background: transparent;
  color: #6c7a8d;
  font-size: 24px; cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
.thumbnail-strip .add-btn:hover { border-color: #e94560; color: #e94560; }
.thumbnail-strip .count-badge {
  font-size: 11px; color: #6c7a8d; margin-left: 6px; flex-shrink: 0;
}

/* Controls panel */
.controls {
  width: 340px;
  background: #1a1a2e;
  border-left: 1px solid #0f3460;
  padding: 16px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
}
.controls .section {
  background: #16213e;
  border-radius: 8px;
  padding: 14px;
  border: 1px solid #0f3460;
}
.controls .section-title {
  font-size: 13px;
  color: #e94560;
  margin-bottom: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Mode tabs */
.mode-tabs { display: flex; gap: 4px; }
.mode-tab {
  flex: 1;
  padding: 8px;
  background: #0f3460;
  border: 1px solid #0f3460;
  color: #6c7a8d;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  text-align: center;
  transition: all 0.2s;
}
.mode-tab.active { background: #e94560; color: #fff; border-color: #e94560; }
.mode-tab:hover:not(.active) { color: #e0e0e0; }

/* Form controls */
.form-group { margin-bottom: 10px; }
.form-group:last-child { margin-bottom: 0; }
.form-group label {
  display: block; font-size: 12px; color: #8a9bb5; margin-bottom: 4px;
}
.form-group input[type="text"],
.form-group select {
  width: 100%;
  padding: 8px 10px;
  background: #0f3460;
  border: 1px solid #1a4a7a;
  border-radius: 6px;
  color: #e0e0e0;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input[type="text"]:focus,
.form-group select:focus { border-color: #e94560; }
.form-group input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 3px;
  background: #0f3460;
  outline: none;
}
.form-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #e94560;
  cursor: pointer;
}
.form-group input[type="color"] {
  width: 36px; height: 30px; border: none; border-radius: 4px;
  cursor: pointer; background: transparent;
}
.form-row { display: flex; gap: 8px; align-items: end; }
.form-row .form-group { flex: 1; }
.form-group .value-label { font-size: 11px; color: #e94560; float: right; }

.btn {
  padding: 10px 16px;
  border: none; border-radius: 6px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #d63852; }
.btn-secondary { background: #0f3460; color: #e0e0e0; }
.btn-secondary:hover { background: #1a4a7a; }
.btn-download {
  width: 100%; padding: 12px;
  background: #e94560; color: #fff;
  font-size: 15px;
}
.btn-download:hover { background: #d63852; }
.btn-download:disabled { background: #2a2a3e; color: #555; cursor: not-allowed; }
.btn-outline {
  background: transparent; border: 1px solid #e94560; color: #e94560;
}
.btn-outline:hover { background: rgba(233,69,96,0.15); }

/* Download buttons group */
.download-group { display: flex; gap: 8px; }
.download-group .btn-download { flex: 1; }
.download-group .btn-outline {
  flex: 0; padding: 12px 16px;
}

/* Batch select bar */
.select-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: #8a9bb5;
}
.select-bar label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
.select-bar input[type="checkbox"] { accent-color: #e94560; }

/* Processing overlay */
.processing-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
}
.processing-overlay .spinner {
  width: 40px; height: 40px;
  border: 3px solid #0f3460;
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing-overlay p { margin-top: 12px; color: #e0e0e0; font-size: 14px; }

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #e94560; color: #fff;
  padding: 12px 28px; border-radius: 8px;
  font-size: 14px; z-index: 1001;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>自定义水印工具</h1>
  <div class="actions">
    <button class="btn btn-secondary" onclick="resetAll()">清除全部</button>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">添加图片</button>
  </div>
</div>

<div class="container">
  <!-- Preview -->
  <div class="preview" id="previewArea">
    <div class="preview-canvas-area" id="canvasArea">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">🖼️</div>
        <p>拖拽图片到此处<br>或点击选择文件（支持多选）<br>或 Ctrl+V 粘贴</p>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
      <div class="canvas-wrapper" id="canvasWrapper" style="display:none;">
        <canvas id="mainCanvas"></canvas>
      </div>
    </div>
    <!-- Thumbnail strip -->
    <div class="thumbnail-strip" id="thumbnailStrip" style="display:none;">
      <button class="add-btn" onclick="document.getElementById('fileInput').click()" title="添加图片">+</button>
      <span class="count-badge" id="countBadge"></span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls" id="controlsPanel">
    <div class="section">
      <div class="section-title">水印模式</div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="single" onclick="switchMode('single')">单个水印</button>
        <button class="mode-tab" data-mode="tile" onclick="switchMode('tile')">斜填充 / 平铺</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">水印文字</div>
      <div class="form-group">
        <input type="text" id="wmText" value="我的水印" placeholder="输入水印文字" oninput="render()">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>字体</label>
          <select id="wmFont" onchange="render()">
            <option value="Arial">Arial</option>
            <option value="Microsoft YaHei" selected>微软雅黑</option>
            <option value="SimHei">黑体</option>
            <option value="SimSun">宋体</option>
            <option value="KaiTi">楷体</option>
            <option value="sans-serif">Sans-serif</option>
          </select>
        </div>
        <div class="form-group">
          <label>字号 <span class="value-label" id="fontSizeLabel">32px</span></label>
          <input type="range" id="wmFontSize" min="12" max="120" value="32" oninput="onFontSizeChange()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>颜色</label>
          <input type="color" id="wmColor" value="#ffffff" onchange="render()">
        </div>
        <div class="form-group">
          <label>不透明度 <span class="value-label" id="opacityLabel">0.3</span></label>
          <input type="range" id="wmOpacity" min="0" max="1" step="0.01" value="0.3" oninput="onOpacityChange()">
        </div>
      </div>
    </div>

    <!-- Single watermark controls -->
    <div class="section" id="singleControls">
      <div class="section-title">单个水印设置</div>
      <div class="form-group">
        <label>旋转角度 <span class="value-label" id="angleLabel">-30°</span></label>
        <input type="range" id="wmAngle" min="-180" max="180" value="-30" oninput="onAngleChange()">
      </div>
      <p style="font-size:11px;color:#6c7a8d;margin-top:6px;">
        提示：在图片上拖动水印调整位置，或点击任意位置移动水印
      </p>
      <div class="select-bar" style="margin-top:8px;">
        <label><input type="checkbox" id="syncPos" onchange="onSyncPosChange()"> 所有图片统一水印位置</label>
      </div>
    </div>

    <!-- Tile controls -->
    <div class="section" id="tileControls" style="display:none;">
      <div class="section-title">平铺设置</div>
      <div class="form-row">
        <div class="form-group">
          <label>列数 <span class="value-label" id="colsLabel">4</span></label>
          <input type="range" id="tileCols" min="1" max="12" value="4" oninput="onTileChange()">
        </div>
        <div class="form-group">
          <label>行数 <span class="value-label" id="rowsLabel">3</span></label>
          <input type="range" id="tileRows" min="1" max="10" value="3" oninput="onTileChange()">
        </div>
      </div>
      <div class="form-group">
        <label>旋转角度 <span class="value-label" id="tileAngleLabel">-30°</span></label>
        <input type="range" id="tileAngle" min="-180" max="180" value="-30" oninput="onTileAngleChange()">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>水平偏移 <span class="value-label" id="offsetXLabel">0%</span></label>
          <input type="range" id="tileOffsetX" min="-50" max="50" value="0" oninput="onTileOffsetChange()">
        </div>
        <div class="form-group">
          <label>垂直偏移 <span class="value-label" id="offsetYLabel">0%</span></label>
          <input type="range" id="tileOffsetY" min="-50" max="50" value="0" oninput="onTileOffsetChange()">
        </div>
      </div>
    </div>

    <div class="select-bar">
      <label><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> 全选 (<span id="selectCount">0</span>张)</label>
    </div>

    <div class="download-group">
      <button class="btn btn-download" id="btnDownloadCurrent" disabled onclick="downloadCurrent()">
        下载当前图
      </button>
      <button class="btn btn-download" id="btnDownloadSelected" disabled onclick="downloadSelected()">
        下载选中
      </button>
    </div>
    <button class="btn btn-outline" id="btnDownloadAll" disabled onclick="downloadAllZip()" style="width:100%;">
      打包下载全部 (ZIP)
    </button>
  </div>
</div>

<!-- Processing overlay -->
<div class="processing-overlay" id="processingOverlay" style="display:none;">
  <div class="spinner"></div>
  <p id="processingMsg">处理中...</p>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== State ====================
// images: [{ img: HTMLImageElement, name: string, wmPos: {x, y}, selected: boolean }]
let images = [];
let currentIndex = 0;
let mode = 'single';
let syncPosition = false; // when true, all images share the same wmPos
let dragging = false;

// ==================== DOM refs ====================
const dropZone = document.getElementById('dropZone');
const canvasWrapper = document.getElementById('canvasWrapper');
const canvasArea = document.getElementById('canvasArea');
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const thumbnailStrip = document.getElementById('thumbnailStrip');

// ==================== Image loading ====================
fileInput.addEventListener('change', e => {
  if (e.target.files.length) {
    loadFiles(Array.from(e.target.files));
    fileInput.value = '';
  }
});

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) loadFiles(files);
});

// Paste from clipboard
document.addEventListener('paste', e => {
  const items = e.clipboardData.items;
  const files = [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      files.push(item.getAsFile());
    }
  }
  if (files.length) loadFiles(files);
});

function loadFiles(files) {
  let loaded = 0;
  const total = files.length;

  files.forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        images.push({
          img: img,
          name: file.name || `image_${images.length + 1}.png`,
          wmPos: { x: 0.5, y: 0.5 },
          selected: true
        });
        loaded++;
        if (loaded === total) {
          onImagesChanged();
          // select the first of the new batch
          currentIndex = images.length - total;
          switchToImage(currentIndex);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function onImagesChanged() {
  const hasImages = images.length > 0;
  dropZone.style.display = hasImages ? 'none' : '';
  canvasWrapper.style.display = hasImages ? 'inline-block' : 'none';
  thumbnailStrip.style.display = hasImages ? 'flex' : 'none';

  if (hasImages) {
    document.getElementById('btnDownloadCurrent').disabled = false;
    document.getElementById('btnDownloadSelected').disabled = false;
    document.getElementById('btnDownloadAll').disabled = false;
  } else {
    document.getElementById('btnDownloadCurrent').disabled = true;
    document.getElementById('btnDownloadSelected').disabled = true;
    document.getElementById('btnDownloadAll').disabled = true;
    mainCanvas.width = 0;
    mainCanvas.height = 0;
    currentIndex = 0;
  }

  updateThumbnails();
  updateSelectCount();
}

function updateThumbnails() {
  // Clear existing thumbs (keep add button and badge)
  const existing = thumbnailStrip.querySelectorAll('.thumb');
  existing.forEach(t => t.remove());

  images.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'thumb' + (i === currentIndex ? ' active' : '');
    div.innerHTML = `<img src="${item.img.src}" alt=""><span class="thumb-index">${i + 1}</span>`
      + `<button class="thumb-remove" title="删除">&times;</button>`
      + `<input type="checkbox" class="thumb-check" ${item.selected ? 'checked' : ''} title="选中/取消">`;
    // Insert before add button
    const addBtn = thumbnailStrip.querySelector('.add-btn');
    thumbnailStrip.insertBefore(div, addBtn);

    div.addEventListener('click', e => {
      if (e.target.classList.contains('thumb-remove')) {
        e.stopPropagation();
        removeImage(i);
        return;
      }
      if (e.target.classList.contains('thumb-check')) {
        e.stopPropagation();
        images[i].selected = e.target.checked;
        updateSelectCount();
        return;
      }
      switchToImage(i);
    });
  });

  document.getElementById('countBadge').textContent = `共 ${images.length} 张`;
}

function switchToImage(index) {
  if (index < 0 || index >= images.length) return;
  currentIndex = index;
  fitCanvas();
  render();
  updateThumbnails();
}

function removeImage(index) {
  images.splice(index, 1);
  if (images.length === 0) {
    onImagesChanged();
    return;
  }
  if (currentIndex >= images.length) currentIndex = images.length - 1;
  onImagesChanged();
  switchToImage(currentIndex);
}

function resetAll() {
  images = [];
  currentIndex = 0;
  onImagesChanged();
  fileInput.value = '';
}

// Fit canvas to preview area
function fitCanvas() {
  const img = getCurrentImage();
  if (!img) return;
  const maxW = canvasArea.clientWidth - 40;
  const maxH = canvasArea.clientHeight - 40;
  let w = img.naturalWidth;
  let h = img.naturalHeight;
  const ratio = Math.min(maxW / w, maxH / h);
  w = Math.floor(w * ratio);
  h = Math.floor(h * ratio);
  mainCanvas.width = w;
  mainCanvas.height = h;
}

function getCurrentImage() {
  if (images.length === 0) return null;
  return images[currentIndex].img;
}

function getCurrentPos() {
  if (images.length === 0) return { x: 0.5, y: 0.5 };
  return images[currentIndex].wmPos;
}

window.addEventListener('resize', () => {
  if (images.length > 0) { fitCanvas(); render(); }
});

// ==================== Mode switching ====================
function switchMode(newMode) {
  mode = newMode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  document.getElementById('singleControls').style.display = mode === 'single' ? '' : 'none';
  document.getElementById('tileControls').style.display = mode === 'tile' ? '' : 'none';
  render();
}

// ==================== Sync position ====================
function onSyncPosChange() {
  syncPosition = document.getElementById('syncPos').checked;
}

// ==================== Select all ====================
function toggleSelectAll() {
  const checked = document.getElementById('selectAll').checked;
  images.forEach(img => img.selected = checked);
  updateThumbnails();
  updateSelectCount();
}

function updateSelectCount() {
  const count = images.filter(i => i.selected).length;
  document.getElementById('selectCount').textContent = count;
  document.getElementById('selectAll').checked = count === images.length && images.length > 0;
}

// ==================== Slider handlers ====================
function onFontSizeChange() {
  document.getElementById('fontSizeLabel').textContent = document.getElementById('wmFontSize').value + 'px';
  render();
}
function onOpacityChange() {
  document.getElementById('opacityLabel').textContent = parseFloat(document.getElementById('wmOpacity').value).toFixed(2);
  render();
}
function onAngleChange() {
  document.getElementById('angleLabel').textContent = document.getElementById('wmAngle').value + '°';
  render();
}
function onTileChange() {
  document.getElementById('colsLabel').textContent = document.getElementById('tileCols').value;
  document.getElementById('rowsLabel').textContent = document.getElementById('tileRows').value;
  render();
}
function onTileAngleChange() {
  document.getElementById('tileAngleLabel').textContent = document.getElementById('tileAngle').value + '°';
  render();
}
function onTileOffsetChange() {
  document.getElementById('offsetXLabel').textContent = document.getElementById('tileOffsetX').value + '%';
  document.getElementById('offsetYLabel').textContent = document.getElementById('tileOffsetY').value + '%';
  render();
}

document.getElementById('wmFontSize').addEventListener('input', onFontSizeChange);
document.getElementById('wmOpacity').addEventListener('input', onOpacityChange);
document.getElementById('wmAngle').addEventListener('input', onAngleChange);
document.getElementById('tileCols').addEventListener('input', onTileChange);
document.getElementById('tileRows').addEventListener('input', onTileChange);
document.getElementById('tileAngle').addEventListener('input', onTileAngleChange);
document.getElementById('tileOffsetX').addEventListener('input', onTileOffsetChange);
document.getElementById('tileOffsetY').addEventListener('input', onTileOffsetChange);

// ==================== Rendering ====================
function getWatermarkConfig() {
  return {
    text: document.getElementById('wmText').value || '我的水印',
    font: document.getElementById('wmFont').value,
    fontSize: parseInt(document.getElementById('wmFontSize').value),
    color: document.getElementById('wmColor').value,
    opacity: parseFloat(document.getElementById('wmOpacity').value),
    angle: parseInt(document.getElementById('wmAngle').value),
    tileCols: parseInt(document.getElementById('tileCols').value),
    tileRows: parseInt(document.getElementById('tileRows').value),
    tileAngle: parseInt(document.getElementById('tileAngle').value),
    tileOffsetX: parseInt(document.getElementById('tileOffsetX').value) / 100,
    tileOffsetY: parseInt(document.getElementById('tileOffsetY').value) / 100,
  };
}

function render() {
  const img = getCurrentImage();
  if (!img) return;
  const cfg = getWatermarkConfig();
  const cw = mainCanvas.width;
  const ch = mainCanvas.height;

  ctx.clearRect(0, 0, cw, ch);
  ctx.drawImage(img, 0, 0, cw, ch);

  ctx.font = `${cfg.fontSize}px "${cfg.font}"`;
  ctx.fillStyle = cfg.color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = cfg.opacity;

  if (mode === 'single') {
    renderSingle(cfg, cw, ch);
  } else {
    renderTile(cfg, cw, ch);
  }

  ctx.globalAlpha = 1;
}

function renderSingle(cfg, cw, ch) {
  const pos = getCurrentPos();
  const x = pos.x * cw;
  const y = pos.y * ch;
  const angleRad = (cfg.angle * Math.PI) / 180;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angleRad);
  ctx.fillText(cfg.text, 0, 0);

  if (!dragging) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    const metrics = ctx.measureText(cfg.text);
    const bw = metrics.width * 0.6;
    const bh = cfg.fontSize * 0.7;
    ctx.strokeRect(-bw, -bh, bw * 2, bh * 2);
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function renderTile(cfg, cw, ch) {
  const cols = cfg.tileCols;
  const rows = cfg.tileRows;
  const angleRad = (cfg.tileAngle * Math.PI) / 180;

  const cellW = cw / cols;
  const cellH = ch / rows;
  const offsetX = cfg.tileOffsetX * cellW;
  const offsetY = cfg.tileOffsetY * cellH;

  const extendCols = 2;
  const extendRows = 2;

  for (let row = -extendRows; row < rows + extendRows; row++) {
    for (let col = -extendCols; col < cols + extendCols; col++) {
      const cx = col * cellW + cellW / 2 + offsetX;
      const cy = row * cellH + cellH / 2 + offsetY;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angleRad);
      ctx.fillText(cfg.text, 0, 0);
      ctx.restore();
    }
  }
}

// ==================== Canvas interaction (single mode) ====================
function getCanvasPos(e) {
  const rect = mainCanvas.getBoundingClientRect();
  const scaleX = mainCanvas.width / rect.width;
  const scaleY = mainCanvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

function isNearWatermark(cx, cy) {
  const cfg = getWatermarkConfig();
  const pos = getCurrentPos();
  const wx = pos.x * mainCanvas.width;
  const wy = pos.y * mainCanvas.height;

  ctx.save();
  ctx.font = `${cfg.fontSize}px "${cfg.font}"`;
  const metrics = ctx.measureText(cfg.text);
  ctx.restore();

  const halfW = metrics.width * 0.6;
  const halfH = cfg.fontSize * 0.7;

  return Math.abs(cx - wx) < halfW && Math.abs(cy - wy) < halfH;
}

function updateWmPos(canvasX, canvasY) {
  const pos = {
    x: Math.max(0, Math.min(1, canvasX / mainCanvas.width)),
    y: Math.max(0, Math.min(1, canvasY / mainCanvas.height)),
  };
  if (syncPosition) {
    images.forEach(img => img.wmPos = { ...pos });
  } else {
    images[currentIndex].wmPos = pos;
  }
}

mainCanvas.addEventListener('mousedown', e => {
  if (images.length === 0 || mode !== 'single') return;
  const pos = getCanvasPos(e);
  if (isNearWatermark(pos.x, pos.y)) {
    dragging = true;
    mainCanvas.style.cursor = 'grabbing';
    e.preventDefault();
  } else {
    updateWmPos(pos.x, pos.y);
    render();
  }
});

mainCanvas.addEventListener('mousemove', e => {
  if (images.length === 0 || mode !== 'single') return;
  const pos = getCanvasPos(e);
  if (dragging) {
    updateWmPos(pos.x, pos.y);
    render();
  } else if (isNearWatermark(pos.x, pos.y)) {
    mainCanvas.style.cursor = 'grab';
  } else {
    mainCanvas.style.cursor = 'crosshair';
  }
});

mainCanvas.addEventListener('mouseup', () => {
  if (dragging) { dragging = false; mainCanvas.style.cursor = 'crosshair'; render(); }
});
mainCanvas.addEventListener('mouseleave', () => {
  if (dragging) { dragging = false; mainCanvas.style.cursor = 'crosshair'; render(); }
});

// Touch support
mainCanvas.addEventListener('touchstart', e => {
  if (images.length === 0 || mode !== 'single') return;
  const touch = e.touches[0];
  const pos = getCanvasPos(touch);
  if (isNearWatermark(pos.x, pos.y)) {
    dragging = true;
    e.preventDefault();
  } else {
    updateWmPos(pos.x, pos.y);
    render();
  }
});
mainCanvas.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const pos = getCanvasPos(e.touches[0]);
  updateWmPos(pos.x, pos.y);
  render();
});
mainCanvas.addEventListener('touchend', () => {
  if (dragging) { dragging = false; render(); }
});

// ==================== Watermark render function (reusable) ====================
function applyWatermarkToCanvas(dCtx, dw, dh, wmPos, cfg, scaleFactor) {
  const scaledFontSize = Math.round(cfg.fontSize * scaleFactor);
  dCtx.font = `${scaledFontSize}px "${cfg.font}"`;
  dCtx.fillStyle = cfg.color;
  dCtx.textAlign = 'center';
  dCtx.textBaseline = 'middle';
  dCtx.globalAlpha = cfg.opacity;

  if (mode === 'single') {
    const x = wmPos.x * dw;
    const y = wmPos.y * dh;
    const angleRad = (cfg.angle * Math.PI) / 180;
    dCtx.save();
    dCtx.translate(x, y);
    dCtx.rotate(angleRad);
    dCtx.fillText(cfg.text, 0, 0);
    dCtx.restore();
  } else {
    const cols = cfg.tileCols;
    const rows = cfg.tileRows;
    const angleRad = (cfg.tileAngle * Math.PI) / 180;
    const cellW = dw / cols;
    const cellH = dh / rows;
    const offsetX = cfg.tileOffsetX * cellW;
    const offsetY = cfg.tileOffsetY * cellH;
    const extendCols = 2;
    const extendRows = 2;

    for (let row = -extendRows; row < rows + extendRows; row++) {
      for (let col = -extendCols; col < cols + extendCols; col++) {
        const cx = col * cellW + cellW / 2 + offsetX;
        const cy = row * cellH + cellH / 2 + offsetY;
        dCtx.save();
        dCtx.translate(cx, cy);
        dCtx.rotate(angleRad);
        dCtx.fillText(cfg.text, 0, 0);
        dCtx.restore();
      }
    }
  }
}

// ==================== Download: single ====================
function downloadCurrent() {
  if (images.length === 0) return;
  downloadSingleImage(images[currentIndex]);
}

function downloadSelected() {
  const selected = images.filter(i => i.selected);
  if (selected.length === 0) { showToast('没有选中的图片'); return; }
  if (selected.length === 1) {
    downloadSingleImage(selected[0]);
    return;
  }
  downloadAsZip(selected);
}

function downloadAllZip() {
  if (images.length === 0) return;
  downloadAsZip(images);
}

function downloadSingleImage(item) {
  const cfg = getWatermarkConfig();
  const downCanvas = document.createElement('canvas');
  downCanvas.width = item.img.naturalWidth;
  downCanvas.height = item.img.naturalHeight;
  const dCtx = downCanvas.getContext('2d');
  dCtx.drawImage(item.img, 0, 0);

  const scaleFactor = Math.min(
    downCanvas.width / mainCanvas.width,
    downCanvas.height / mainCanvas.height
  );
  applyWatermarkToCanvas(dCtx, downCanvas.width, downCanvas.height, item.wmPos, cfg, scaleFactor);

  downCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const baseName = item.name.replace(/\.[^.]+$/, '');
    a.download = baseName + '_watermarked.png';
    a.click();
    URL.revokeObjectURL(url);
    showToast('下载完成！');
  }, 'image/png');
}

async function downloadAsZip(itemList) {
  const overlay = document.getElementById('processingOverlay');
  const msg = document.getElementById('processingMsg');
  overlay.style.display = 'flex';
  msg.textContent = `处理 0 / ${itemList.length}...`;

  const zip = new JSZip();
  const cfg = getWatermarkConfig();

  for (let i = 0; i < itemList.length; i++) {
    const item = itemList[i];
    msg.textContent = `处理 ${i + 1} / ${itemList.length}...`;

    const canvas = document.createElement('canvas');
    canvas.width = item.img.naturalWidth;
    canvas.height = item.img.naturalHeight;
    const dCtx = canvas.getContext('2d');
    dCtx.drawImage(item.img, 0, 0);

    // Use a reasonable scale factor; watermark is sized relative to display canvas
    const scaleFactor = Math.min(canvas.width / Math.max(mainCanvas.width, 1), 1);
    applyWatermarkToCanvas(dCtx, canvas.width, canvas.height, item.wmPos, cfg, scaleFactor);

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const baseName = item.name.replace(/\.[^.]+$/, '');
    zip.file(baseName + '_watermarked.png', blob);
  }

  msg.textContent = '正在打包...';
  const zipBlob = await zip.generateAsync({ type: 'blob' });

  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'watermarked_images.zip';
  a.click();
  URL.revokeObjectURL(url);

  overlay.style.display = 'none';
  showToast(`已完成！共处理 ${itemList.length} 张图片`);
}

// ==================== Toast ====================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ==================== Init ====================
document.getElementById('fontSizeLabel').textContent = document.getElementById('wmFontSize').value + 'px';
document.getElementById('opacityLabel').textContent = parseFloat(document.getElementById('wmOpacity').value).toFixed(2);
document.getElementById('angleLabel').textContent = document.getElementById('wmAngle').value + '°';
</script>
